<header>
  <h1><i class="fas fa-tasks"></i> Todo Task Timer</h1>
  <div class="header-controls">
    <button
      id="global-collapse-btn"
      class="btn btn-ghost theme-btn"
      data-tooltip="Collapse All Panels"
    >
      <i class="fas fa-chevron-up"></i>
      <span class="btn-label">Collapse</span>
    </button>
    <button id="global-expand-btn" class="btn btn-ghost theme-btn" data-tooltip="Expand All Panels">
      <i class="fas fa-chevron-down"></i>
      <span class="btn-label">Expand</span>
    </button>
    
    <div class="divider-vertical"></div>

    <button id="guide-btn" class="btn btn-ghost theme-btn" data-tooltip="Show Guide">
      <i class="fas fa-book-open"></i>
      <span class="btn-label">Guide</span>
    </button>
    <button id="reset-app-btn" class="btn btn-ghost theme-btn danger-hover" data-tooltip="Reset App Data">
      <i class="fas fa-undo"></i>
      <span class="btn-label">Reset</span>
    </button>
    <button id="theme-toggle-btn" class="btn btn-ghost theme-btn" data-tooltip="Toggle Dark Mode">
      <i class="fas fa-sun"></i>
      <i class="fas fa-moon"></i>
      <span class="btn-label">Theme</span>
    </button>
  </div>
</header>
